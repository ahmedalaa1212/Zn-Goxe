<div class="farm-container" style="padding: 20px; direction: rtl; font-family: sans-serif; padding-bottom: 80px;">
    
    <!-- شريط البيانات العلوي -->
    <div style="display: flex; justify-content: space-between; padding: 15px; background: #1a1a1a; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333;">
        <div id="farm-rate" style="color: #ffcc00; font-weight: bold; font-size: 16px;">⚡ 0/س</div>
        <div id="farm-balance" style="color: #ffcc00; font-weight: bold; font-size: 16px;">ZN: 0</div>
    </div>

    <!-- العملة الدوارة 3D -->
    <div style="display: flex; justify-content: center; margin-bottom: 25px; perspective: 1000px;">
        <div class="coin-3d">
            ZN
        </div>
    </div>
    
    <!-- شريط التخزين -->
    <div style="width: 100%; background: #333; height: 20px; border-radius: 10px; overflow: hidden; margin-bottom: 8px; border: 1px solid #444;">
        <div id="storage-progress" style="width: 0%; height: 100%; transition: width 0.3s, background 0.3s; background: linear-gradient(90deg, #0088cc, #00bfff);"></div>
    </div>
    <div id="storage-text" style="text-align: center; font-size: 14px; color: #ccc; margin-bottom: 15px; font-weight: bold;">
        0 / 0
    </div>
    
    <!-- زر التجميع الذكي (اعلانات + 60 ثانية) -->
    <button id="claim-btn" onclick="handleClaim()" style="width: 100%; padding: 15px; background: #0088cc; border: none; color: white; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.3s;">
        تجميع الرصيد 📺
    </button>

    <!-- زر إضافة رصيد للتجربة (وهمي للواجهة فقط) -->
    <button onclick="addTestBalance()" style="width: 100%; padding: 10px; background: #800080; border: none; color: white; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer; margin-bottom: 25px; border: 1px solid #ff00ff;">
        💰 إضافة 50,000 ZN للتجربة (تأثير واجهة فقط)
    </button>

    <!-- قسم المكافأة اليومية (التصميم الاحترافي الجديد) -->
    <div style="background: #1a1a1a; border-radius: 12px; border: 1px solid #333; padding: 15px; margin-bottom: 25px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span style="color: #fff; font-weight: bold; font-size: 15px;">🎁 المكافأة اليومية</span>
            <span id="daily-timer" style="color: #ff4444; font-size: 14px; font-weight: bold; display: none;">00:00:00</span>
        </div>
        
        <!-- حاوية الـ 7 أيام قابلة للتمرير يميناً ويساراً -->
        <div id="daily-rewards-container" style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: thin; scrollbar-color: #555 #1a1a1a;">
            <!-- سيتم توليد الـ 7 أيام هنا بواسطة الجافاسكريبت -->
        </div>
    </div>

    <!-- شبكة التعدين (3 عواميد × 3 صفوف = 9 مستويات) -->
    <div id="mining-fields" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;">
        <!-- سيتم توليد الـ 9 مستويات هنا بواسطة الجافاسكريبت -->
    </div>
</div>
