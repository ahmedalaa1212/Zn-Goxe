<div class="farm-container" style="text-align: center; color: #fff; padding: 20px;">
    <!-- شريط البيانات العلوي المربوط بالسيرفر -->
    <div class="header-stats" style="display: flex; justify-content: space-between; padding: 10px; background: #1c1c1c; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333;">
        <div class="stat" id="farm-rate">⚡ 20/س</div>
        <div class="stat" id="farm-balance" style="color: #ffcc00;">ZN: 0</div>
    </div>

    <!-- العملة الدوارة -->
    <div class="coin-container" style="margin: 20px 0;">
        <div class="rotating-coin" style="
            width: 80px; height: 80px; 
            background: radial-gradient(circle, #ffcc00, #b8860b); 
            border-radius: 50%; margin: 0 auto; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; font-weight: bold; color: #fff; 
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
            animation: spin 3s linear infinite;">
            ZN
        </div>
    </div>
    
    <!-- شريط التقدم التلقائي للمخزن -->
    <div style="width: 100%; background: #333; height: 20px; border-radius: 10px; overflow: hidden; margin-bottom: 5px;">
        <div id="storage-progress" style="width: 0%; background: #0088cc; height: 100%; transition: width 0.5s;"></div>
    </div>
    <p id="storage-text" style="font-size: 12px; margin-bottom: 20px;">0 / 10,000</p>
    
    <!-- زر التجميع الفعلي المربوط بالفايربيس -->
    <button id="claim-btn" onclick="triggerClaimFromBtn()" style="width: 100%; padding: 12px; background: #0088cc; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px;">تجميع (Claim)</button>

    <!-- شريط المكافأة اليومية -->
    <div style="margin-bottom: 20px; padding: 10px; background: #222; border-radius: 8px; border: 1px solid #444; display: flex; justify-content: space-between; align-items: center; font-size: 13px;">
        <span>🎁 مكافأة اليوم: 500 ZN</span>
        <button style="background: #0088cc; border: none; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer;">استلام</button>
    </div>

    <!-- حقول التعدين الـ 10 الحقيقية -->
    <div id="mining-fields" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px;">
    </div>
</div>

<style>
@keyframes spin {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
}
</style>
