<style>
    .users-section {
        display: flex;
        flex-direction: column;
        gap: 15px;
        color: #fff;
        font-family: Tahoma, Arial, sans-serif;
        padding-bottom: 20px;
    }
    .u-card {
        background: #1e293b;
        border-radius: 12px;
        padding: 15px;
        border: 1px solid #334155;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .u-header-title {
        color: #f59e0b;
        font-size: 18px;
        margin: 0 0 5px 0;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .u-header-desc {
        color: #94a3b8;
        font-size: 12px;
        margin: 0;
    }
    .u-search-box {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 15px;
    }
    .u-search-box input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #475569;
        background: #0f172a;
        color: #fff;
        font-size: 14px;
        box-sizing: border-box;
        outline: none;
    }
    .u-search-box input:focus {
        border-color: #f59e0b;
    }
    .u-search-box button {
        width: 100%;
        background: #f59e0b;
        color: #000;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
    }
    .u-search-box button:active {
        transform: scale(0.98);
        background: #d97706;
    }
    .u-table-container {
        width: 100%;
        overflow-x: auto;
    }
    .u-table {
        width: 100%;
        min-width: 500px;
        border-collapse: collapse;
        text-align: center;
    }
    .u-table th {
        background: #0f172a;
        color: #94a3b8;
        padding: 12px 10px;
        font-size: 13px;
        white-space: nowrap;
    }
    .u-table td {
        padding: 12px 10px;
        border-bottom: 1px solid #334155;
        vertical-align: middle;
        font-size: 13px;
    }
    .u-badge {
        background: #334155;
        padding: 4px 8px;
        border-radius: 6px;
        color: #f8fafc;
        font-weight: bold;
    }
    .u-btn {
        padding: 6px 12px;
        border-radius: 6px;
        border: none;
        font-weight: bold;
        font-size: 12px;
        cursor: pointer;
        margin: 2px;
    }
    .u-btn-ban { background: #ef4444; color: #fff; }
    .u-btn-unban { background: #10b981; color: #fff; }
    .u-btn-add { background: #3b82f6; color: #fff; }
</style>

<div class="users-section animate-fade-in">
    <!-- كارت البحث -->
    <div class="u-card">
        <h2 class="u-header-title">👥 بيانات المستخدمين</h2>
        <p class="u-header-desc">إدارة جميع مستخدمين البوت والتحكم بهم</p>
        
        <div class="u-search-box">
            <input type="text" id="uSearchInput" placeholder="🔍 ابحث بالـ ID أو الاسم..." oninput="uSearch()">
            <button onclick="uFetch()">🔄 تحديث البيانات</button>
        </div>
    </div>

    <!-- كارت الجدول -->
    <div class="u-card" style="padding: 0; overflow: hidden;">
        <div class="u-table-container">
            <table class="u-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>الاسم</th>
                        <th>الرصيد</th>
                        <th>الانضمام</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="uTableBody">
                    <tr><td colspan="5" style="color: #f59e0b; padding: 25px;">جاري جلب البيانات... ⏳</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
