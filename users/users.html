<style>
    /* تصميم احترافي مخصص لشاشات الموبايل */
    .users-section {
        display: flex;
        flex-direction: column;
        gap: 15px;
        color: #fff;
        font-family: Tahoma, Arial, sans-serif;
        padding-bottom: 20px;
    }
    .u-card {
        background: #1e293b;
        border-radius: 12px;
        padding: 15px;
        border: 1px solid #334155;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .u-header-title {
        color: #f59e0b;
        font-size: 18px;
        margin: 0 0 5px 0;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .u-header-desc {
        color: #94a3b8;
        font-size: 12px;
        margin: 0;
    }
    
    /* تعديل مربع البحث والزرار (تحت بعض) */
    .u-search-box {
        display: flex;
        flex-direction: column; /* جعل العناصر تحت بعضها */
        gap: 10px;
        margin-top: 15px;
    }
    .u-search-box input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #475569;
        background: #0f172a;
        color: #fff;
        font-size: 14px;
        box-sizing: border-box;
        outline: none;
    }
    .u-search-box input:focus {
        border-color: #f59e0b;
    }
    .u-search-box button {
        width: 100%;
        background: #f59e0b;
        color: #000;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
    }
    .u-search-box button:active {
        transform: scale(0.98);
        background: #d97706;
    }

    /* تعديل الجدول ليناسب الشاشات الصغيرة بدون تداخل */
    .u-table-container {
        width: 100%;
        overflow-x: auto; /* يسمح بسحب الجدول يمين ويسار */
    }
    .u-table {
        width: 100%;
        min-width: 500px; /* إجبار الجدول على مساحة معينة لمنع تداخل النصوص */
        border-collapse: collapse;
        text-align: center;
    }
    .u-table th {
        background: #0f172a;
        color: #94a3b8;
        padding: 12px 10px;
        font-size: 13px;
        white-space: nowrap;
    }
    .u-table td {
        padding: 12px 10px;
        border-bottom: 1px solid #334155;
        vertical-align: middle;
        font-size: 13px;
    }
    .u-badge {
        background: #334155;
        padding: 4px 8px;
        border-radius: 6px;
        color: #f8fafc;
        font-weight: bold;
    }
    .u-btn {
        padding: 6px 12px;
        border-radius: 6px;
        border: none;
        font-weight: bold;
        font-size: 12px;
        cursor: pointer;
        margin: 2px;
    }
    .u-btn-ban { background: #ef4444; color: #fff; }
    .u-btn-unban { background: #10b981; color: #fff; }
    .u-btn-add { background: #3b82f6; color: #fff; }
</style>

<div class="users-section animate-fade-in">
    <!-- كارت البحث -->
    <div class="u-card">
        <h2 class="u-header-title">👥 بيانات المستخدمين</h2>
        <p class="u-header-desc">إدارة جميع مستخدمين البوت والتحكم بهم</p>
        
        <div class="u-search-box">
            <input type="text" id="uSearchInput" placeholder="🔍 ابحث بالـ ID أو الاسم..." oninput="window.uSearch()">
            <button onclick="window.uFetch()">🔄 تحديث البيانات</button>
        </div>
    </div>

    <!-- كارت الجدول -->
    <div class="u-card" style="padding: 0; overflow: hidden;">
        <div class="u-table-container">
            <table class="u-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>الاسم</th>
                        <th>الرصيد</th>
                        <th>الانضمام</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="uTableBody">
                    <tr><td colspan="5" style="color: #f59e0b; padding: 25px;">جاري جلب البيانات... ⏳</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- خدعة برمجية لتشغيل الجافاسكريبت إجبارياً عند فتح القسم -->
<img src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" onload="initUsersJS()" style="display:none;" />

<script>
    // تم وضع الأكواد داخل دالة تعمل فوراً لضمان التشغيل
    function initUsersJS() {
        window.uData = []; 

        window.uFetch = async function() {
            const tbody = document.getElementById('uTableBody');
            if(!tbody) return;
            
            tbody.innerHTML = '<tr><td colspan="5" style="color: #f59e0b; padding: 25px;">جاري تحديث البيانات... ⏳</td></tr>';
            
            try {
                // إضافة متغير وقت لمنع الكاش وجلب أحدث بيانات دائماً
                let res = await fetch('/api/users?t=' + new Date().getTime());
                let json = await res.json();
                
                if(json.success) {
                    window.uData = json.users;
                    window.uRender(window.uData);
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" style="color: #ef4444; padding: 25px;">❌ فشل جلب البيانات من السيرفر</td></tr>';
                }
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="5" style="color: #ef4444; padding: 25px;">❌ خطأ في الاتصال، تأكد من عمل السيرفر</td></tr>';
            }
        };

        window.uRender = function(usersList) {
            const tbody = document.getElementById('uTableBody');
            if(!tbody) return;
            tbody.innerHTML = '';
            
            if(!usersList || usersList.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="color: #94a3b8; padding: 25px;">لا يوجد مستخدمين مسجلين.</td></tr>';
                return;
            }

            usersList.forEach(u => {
                let tr = document.createElement('tr');
                if(u.isBanned) tr.style.opacity = "0.4"; // بهتان سطر المستخدم المحظور
                
                let actionBtn = u.isBanned 
                    ? `<button class="u-btn u-btn-unban" onclick="window.uAction('${u.id}', 'unban')">فك الحظر</button>`
                    : `<button class="u-btn u-btn-ban" onclick="window.uAction('${u.id}', 'ban')">حظر</button>`;

                tr.innerHTML = `
                    <td style="color: #f59e0b; font-weight: bold;">${u.id}</td>
                    <td>${u.name}</td>
                    <td><span class="u-badge">${u.balance} 💰</span></td>
                    <td style="color: #94a3b8;">${u.joinDate}</td>
                    <td>
                        ${actionBtn}
                        <button class="u-btn u-btn-add" onclick="window.uAddBal('${u.id}')">➕ رصيد</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        };

        window.uSearch = function() {
            let term = document.getElementById('uSearchInput').value.toLowerCase();
            let filtered = window.uData.filter(u => 
                u.id.includes(term) || u.name.toLowerCase().includes(term)
            );
            window.uRender(filtered);
        };

        window.uAction = async function(id, action) {
            if(!confirm(action === 'ban' ? 'هل أنت متأكد من حظر المستخدم؟' : 'هل أنت متأكد من فك الحظر؟')) return;
            try {
                await fetch('/api/users/' + id + '/action', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: action })
                });
                window.uFetch(); // تحديث فوري بعد الأكشن
            } catch(e) { alert('حدث خطأ أثناء التنفيذ!'); }
        };

        window.uAddBal = async function(id) {
            let val = prompt("أدخل قيمة الرصيد المراد إضافته (أرقام فقط):");
            if(!val || isNaN(val)) return;
            try {
                await fetch('/api/users/' + id + '/action', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'add_balance', value: parseInt(val) })
                });
                alert('✅ تم إضافة الرصيد بنجاح!');
                window.uFetch(); // تحديث فوري بعد الإضافة
            } catch(e) { alert('حدث خطأ أثناء الإضافة!'); }
        };

        // جلب البيانات تلقائياً بمجرد فتح القسم
        window.uFetch();
    }
</script>
