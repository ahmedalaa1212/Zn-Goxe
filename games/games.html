<!-- شريط الرصيد العلوي -->
<div style="position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.8); border: 1px solid #333; padding: 8px 20px; border-radius: 20px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 8px;">
    <i class="fas fa-coins" style="color: #ffcc00; font-size: 16px;"></i>
    <span id="top-balance-games" style="color: #fff; font-weight: bold; font-size: 16px;">0 ZN</span>
</div>

<div class="games-container" style="padding: 10px; padding-top: 60px; padding-bottom: 20px;">
    
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="color: #fff; font-size: 20px;">ألعاب الحظ والمكافآت 🎮</h2>
        <p style="color: #888; font-size: 12px; margin-top: 5px;">العب مجاناً، شاهد الإعلانات، وضاعف رصيدك!</p>
    </div>

    <!-- اللعبة الأولى: صندوق الحظ (زي ما هي) -->
    <div style="background: #1c1c1c; border: 1px solid #444; border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, #ffcc00, #ff8800);"></div>
        <div style="font-size: 50px; margin-bottom: 10px; animation: float 2s infinite ease-in-out;">🎁</div>
        <h3 style="color: #fff; font-size: 18px; margin-bottom: 5px;">صندوق الحظ اليومي</h3>
        <p style="color: #aaa; font-size: 12px; margin-bottom: 15px;">افتح الصندوق واربح مكافأة عشوائية تصل إلى 50,000 ZN</p>
        <button id="btn-play-box" onclick="playGame('box')" style="width: 100%; padding: 12px; background: linear-gradient(90deg, #0088cc, #00bfff); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);">
            افتح الصندوق الآن (إعلان 📺)
        </button>
    </div>

    <!-- اللعبة الثانية الجديدة: عجلة الحظ (بديلة المراهنة) -->
    <div style="background: #1c1c1c; border: 1px solid #444; border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, #e100ff, #7f00ff);"></div>
        
        <!-- تصميم العجلة -->
        <div style="position: relative; width: 100px; height: 100px; margin: 0 auto 15px auto;">
            <div id="spin-wheel" style="width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#ff0000 0% 25%, #00ff00 25% 50%, #0000ff 50% 75%, #ffcc00 75% 100%); border: 3px solid #fff; box-shadow: 0 0 15px rgba(225, 0, 255, 0.5); transition: transform 3s cubic-bezier(0.25, 0.1, 0.25, 1);"></div>
            <div style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 20px solid #fff; z-index: 2;"></div>
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; background: #fff; border-radius: 50%; z-index: 2;"></div>
        </div>

        <h3 style="color: #fff; font-size: 18px; margin-bottom: 5px;">عجلة حظ ZN الدوارة</h3>
        <p style="color: #aaa; font-size: 12px; margin-bottom: 15px;">لف العجلة وحظك نصيبك! مفيش خسارة أبداً.</p>
        
        <button id="btn-play-spin" onclick="playGame('spin')" style="width: 100%; padding: 12px; background: linear-gradient(90deg, #e100ff, #7f00ff); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(127, 0, 255, 0.4);">
            لف العجلة الآن (إعلان 📺)
        </button>
    </div>

    <style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</div>
