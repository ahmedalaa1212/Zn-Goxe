<div class="games-container" style="padding: 10px; padding-bottom: 20px;">
    
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="color: #fff; font-size: 20px;">ألعاب الحظ والمكافآت 🎮</h2>
        <p style="color: #888; font-size: 12px; margin-top: 5px;">العب، شاهد الإعلان، وضاعف رصيدك!</p>
    </div>

    <!-- اللعبة الأولى: صندوق الحظ -->
    <div style="background: #1c1c1c; border: 1px solid #444; border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; position: relative; overflow: hidden;">
        <!-- شريط ديكور -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, #ffcc00, #ff8800);"></div>
        
        <div style="font-size: 60px; margin-bottom: 10px; animation: float 2s infinite ease-in-out;">🎁</div>
        <h3 style="color: #fff; font-size: 18px; margin-bottom: 5px;">صندوق الحظ اليومي</h3>
        <p style="color: #aaa; font-size: 12px; margin-bottom: 15px;">افتح الصندوق واربح مكافأة عشوائية تصل إلى 50,000 ZN</p>
        
        <button id="btn-play-box" onclick="playGame('box')" style="width: 100%; padding: 12px; background: linear-gradient(90deg, #0088cc, #00bfff); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);">
            افتح الصندوق الآن (إعلان 📺)
        </button>
    </div>

    <!-- اللعبة الثانية: عملة الحظ -->
    <div style="background: #1c1c1c; border: 1px solid #444; border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, #28a745, #218838);"></div>
        
        <div style="font-size: 60px; margin-bottom: 10px;">🪙</div>
        <h3 style="color: #fff; font-size: 18px; margin-bottom: 5px;">توقع العملة (ملك ولا كتابة)</h3>
        <p style="color: #aaa; font-size: 12px; margin-bottom: 15px;">لو توقعك صح، هتاخد ضعف الرصيد اللي هتحطه!</p>
        
        <!-- في المرحلة التانية هنضيف هنا اختيار (ملك/كتابة) ومربع للمبلغ -->
        <button id="btn-play-coin" onclick="alert('لعبة توقع العملة ستعمل مع تحديث السيرفر القادم!')" style="width: 100%; padding: 12px; background: #333; color: #888; border: 1px solid #555; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: not-allowed;">
            قريباً جداً ⏳
        </button>
    </div>

    <style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</div>
