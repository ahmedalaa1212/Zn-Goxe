<!-- شريط الرصيد العلوي -->
<div style="position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.8); border: 1px solid #333; padding: 8px 20px; border-radius: 20px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 8px;">
    <i class="fas fa-coins" style="color: #ffcc00; font-size: 16px;"></i>
    <span id="top-balance-games" style="color: #fff; font-weight: bold; font-size: 16px;">0 ZN</span>
</div>

<div class="games-container" style="padding: 10px; padding-top: 60px; padding-bottom: 20px;">
    
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="color: #fff; font-size: 20px;">ألعاب الحظ والمكافآت 🎮</h2>
        <p style="color: #888; font-size: 12px; margin-top: 5px;">العب مجاناً، ضاعف رصيدك، واكسب!</p>
    </div>

    <!-- اللعبة الأولى: صندوق الحظ -->
    <div style="background: #1c1c1c; border: 1px solid #444; border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, #ffcc00, #ff8800);"></div>
        <div style="font-size: 50px; margin-bottom: 10px; animation: float 2s infinite ease-in-out;">🎁</div>
        <h3 style="color: #fff; font-size: 18px; margin-bottom: 5px;">صندوق الحظ اليومي</h3>
        <p style="color: #aaa; font-size: 12px; margin-bottom: 15px;">اربح مكافأة عشوائية تصل إلى 50,000 ZN</p>
        <button id="btn-play-box" onclick="playGame('box')" style="width: 100%; padding: 12px; background: linear-gradient(90deg, #0088cc, #00bfff); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4); transition: 0.3s;">
            افتح الصندوق الآن (إعلان 📺)
        </button>
    </div>

    <!-- اللعبة الثانية: عجلة الحظ الدوارة -->
    <div style="background: #1c1c1c; border: 1px solid #444; border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, #e100ff, #7f00ff);"></div>
        
        <!-- تصميم العجلة الحقيقية 12 قسم -->
        <div style="position: relative; width: 220px; height: 220px; margin: 0 auto 20px auto;">
            <!-- المؤشر -->
            <div style="position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #fff; z-index: 10; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));"></div>
            <!-- العجلة -->
            <div id="spin-wheel" style="width: 100%; height: 100%; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 0 20px rgba(225, 0, 255, 0.5); transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1); position: relative; overflow: hidden;">
                <!-- سيتم إنشاء الأقسام والأرقام برمجياً بالـ JS -->
            </div>
            <!-- مركز العجلة -->
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; background: #fff; border-radius: 50%; z-index: 5; box-shadow: inset 0 0 5px #000;"></div>
        </div>

        <h3 style="color: #fff; font-size: 18px; margin-bottom: 5px;">عجلة حظ ZN الدوارة</h3>
        <p style="color: #aaa; font-size: 12px; margin-bottom: 15px;">لف العجلة وحظك نصيبك! مفيش خسارة.</p>
        <button id="btn-play-spin" onclick="playGame('spin')" style="width: 100%; padding: 12px; background: linear-gradient(90deg, #e100ff, #7f00ff); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(127, 0, 255, 0.4); transition: 0.3s;">
            لف العجلة الآن (إعلان 📺)
        </button>
    </div>

    <!-- نافذة الفوز والمضاعفة (Modal) مخفية افتراضياً -->
    <div id="win-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
        <div style="background: linear-gradient(180deg, #1c1c1c, #121212); border: 2px solid #ffcc00; border-radius: 20px; width: 85%; padding: 30px 20px; text-align: center; box-shadow: 0 0 30px rgba(255, 204, 0, 0.3); animation: zoomIn 0.4s;">
            <div style="font-size: 60px; margin-bottom: 10px;">🎉</div>
            <h2 style="color: #fff; font-size: 22px; margin-bottom: 5px;">مبروك كسبت!</h2>
            <div id="win-amount" style="color: #ffcc00; font-size: 30px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);">0 ZN</div>
            
            <button id="btn-claim-x2" onclick="claimReward('double')" style="width: 100%; padding: 15px; background: linear-gradient(90deg, #28a745, #218838); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);">
                ضاعفها x2 (إعلان 📺)
            </button>
            <button id="btn-claim-normal" onclick="claimReward('normal')" style="width: 100%; padding: 12px; background: transparent; color: #aaa; border: 1px solid #555; border-radius: 10px; font-weight: bold; font-size: 14px; cursor: pointer;">
                استلام المكافأة فقط
            </button>
        </div>
    </div>

    <style>
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        /* زر معطل (وقت الانتظار) */
        .btn-disabled { background: #333 !important; color: #888 !important; box-shadow: none !important; cursor: not-allowed !important; border: 1px solid #444; }
    </style>
</div>
