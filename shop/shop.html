<!-- واجهة المتجر بالكامل -->
<div class="shop-container" style="padding:20px; color:#fff; max-width:400px; margin:0 auto; background:#0f0f0f; min-height:100vh;">
    
    <!-- العنوان والرصيد -->
    <div style="text-align:center; margin-bottom:20px;">
        <h2 style="margin:0; color:#00cc66; font-size:24px;">المتجر 🛒</h2>
        <p style="color:#aaa; font-size:14px; margin-top:5px;">طوّر حسابك لزيادة أرباحك</p>
        <div style="background:#1c1c1c; padding:10px 20px; border-radius:10px; margin-top:10px; display:inline-block; border:1px solid #333;">
            رصيدك: <b id="shop-zn-balance" style="color:#00cc66;">15400</b> <span style="color:#aaa; font-size:12px;">ZN</span>
        </div>
    </div>

    <!-- التبويبات -->
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button id="btn-mining" onclick="renderShopTab('mining')" style="flex:1; padding:12px; border:none; color:white; border-radius:8px; background:#0088cc; font-weight:bold;">باقات التعدين</button>
        <button id="btn-storage" onclick="renderShopTab('storage')" style="flex:1; padding:12px; border:none; color:white; border-radius:8px; background:#222; font-weight:bold;">سعة التخزين</button>
    </div>

    <!-- منطقة عرض الباقات -->
    <div id="shop-content" style="display:flex; flex-direction:column; gap:10px; padding-bottom:30px;"></div>

</div>

<!-- سكريبت التشغيل الفوري لحل مشكلة الشاشة الفاضية -->
<script>
    if (typeof renderShopTab === 'function') {
        let lastTab = localStorage.getItem('lastShopTab') || 'mining';
        renderShopTab(lastTab);
    }
</script>
