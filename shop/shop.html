<!-- نافذة تأكيد الشراء (مخفية افتراضياً) -->
<div id="confirm-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:1000;">
    <div style="background:#1c1c1c; padding:25px; border-radius:15px; width:80%; max-width:300px; text-align:center; border:1px solid #333;">
        <h3 style="margin-top:0; color:#fff;">تأكيد الشراء</h3>
        <p style="color:#aaa; font-size:14px; margin:15px 0;" id="modal-text"></p>
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal()" style="flex:1; padding:10px; background:#444; border:none; color:white; border-radius:8px;">إلغاء</button>
            <button id="modal-confirm-btn" style="flex:1; padding:10px; background:#00cc66; border:none; color:white; border-radius:8px; font-weight:bold;">تأكيد</button>
        </div>
    </div>
</div>
