<div class="shop-container" style="padding: 15px; direction: rtl; font-family: sans-serif; padding-bottom: 80px;">
    
    <!-- شريط البيانات العلوي (تمت إضافته ليطابق المزرعة) -->
    <div style="display: flex; justify-content: space-between; padding: 15px; background: #1a1a1a; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333;">
        <div id="shop-rate" style="color: #ffcc00; font-weight: bold; font-size: 16px;">⚡ 0/س</div>
        <div id="shop-balance" style="color: #ffcc00; font-weight: bold; font-size: 16px;">ZN: 0</div>
    </div>

    <!-- قسم عروض الـ USDT المميزة -->
    <h3 style="color: #fff; margin-bottom: 10px; font-size: 18px;">💎 عروض مميزة (USDT)</h3>
    <div style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 25px; scrollbar-width: none;">
        
        <!-- العرض الأول -->
        <div class="usdt-card" style="min-width: 140px; background: linear-gradient(135deg, #1c1c1c, #2a2a2a); border: 1px solid #28a745; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 4px 10px rgba(40, 167, 69, 0.2);">
            <div style="font-size: 24px; margin-bottom: 5px;">📦</div>
            <div style="color: #fff; font-weight: bold; font-size: 14px;">باقة المبتدئين</div>
            <div style="color: #28a745; font-weight: bold; font-size: 16px; margin: 5px 0;">5 USDT</div>
            <button onclick="buyWithUSDT('5')" style="width: 100%; background: #28a745; color: white; border: none; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer;">شراء الآن</button>
        </div>

        <!-- العرض الثاني -->
        <div class="usdt-card" style="min-width: 140px; background: linear-gradient(135deg, #1c1c1c, #332b00); border: 1px solid #ffcc00; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 4px 10px rgba(255, 204, 0, 0.2);">
            <div style="font-size: 24px; margin-bottom: 5px;">🚀</div>
            <div style="color: #fff; font-weight: bold; font-size: 14px;">باقة المحترفين</div>
            <div style="color: #ffcc00; font-weight: bold; font-size: 16px; margin: 5px 0;">15 USDT</div>
            <button onclick="buyWithUSDT('15')" style="width: 100%; background: #ffcc00; color: #000; border: none; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer;">شراء الآن</button>
        </div>

        <!-- العرض الثالث -->
        <div class="usdt-card" style="min-width: 140px; background: linear-gradient(135deg, #1c1c1c, #3a1c1c); border: 1px solid #ff4444; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 4px 10px rgba(255, 68, 68, 0.2);">
            <div style="font-size: 24px; margin-bottom: 5px;">👑</div>
            <div style="color: #fff; font-weight: bold; font-size: 14px;">باقة الحيتان</div>
            <div style="color: #ff4444; font-weight: bold; font-size: 16px; margin: 5px 0;">50 USDT</div>
            <button onclick="buyWithUSDT('50')" style="width: 100%; background: #ff4444; color: white; border: none; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer;">شراء الآن</button>
        </div>
        
    </div>

    <!-- أزرار التنقل -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="tab-mining" onclick="switchShopTab('mining')" style="flex: 1; padding: 12px; background: #0088cc; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">ترقيات التعدين</button>
        <button id="tab-storage" onclick="switchShopTab('storage')" style="flex: 1; padding: 12px; background: #333; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">المخازن</button>
    </div>

    <!-- قسم مستويات التعدين -->
    <div id="shop-mining-section" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;"></div>

    <!-- قسم المخازن -->
    <div id="shop-storage-section" style="display: none; grid-template-columns: repeat(2, 1fr); gap: 10px;"></div>

</div>
