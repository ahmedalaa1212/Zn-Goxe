<div class="shop-container" style="padding:20px; color:#fff; max-width:400px; margin:0 auto; background:#0f0f0f; min-height:100vh;">
    
    <div style="text-align:center; margin-bottom:20px;">
        <h2 style="margin:0; color:#00cc66; font-size:24px;">المتجر 🛒</h2>
        <div style="background:#1c1c1c; padding:10px 20px; border-radius:10px; margin-top:10px; display:inline-block; border:1px solid #333;">
            رصيدك: <b id="shop-zn-balance" style="color:#00cc66;">15,400</b> <span style="color:#aaa; font-size:12px;">ZN</span>
        </div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button id="btn-mining" onclick="renderShopTab('mining')" style="flex:1; padding:12px; border:none; color:white; border-radius:8px; background:#222; font-weight:bold;">باقات التعدين</button>
        <button id="btn-storage" onclick="renderShopTab('storage')" style="flex:1; padding:12px; border:none; color:white; border-radius:8px; background:#222; font-weight:bold;">سعة التخزين</button>
    </div>

    <div id="shop-content"></div>

    <!-- نافذة التأكيد -->
    <div id="confirm-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:1000;">
        <div style="background:#1c1c1c; padding:25px; border-radius:15px; width:80%; max-width:300px; text-align:center; border:1px solid #333;">
            <h3 style="color:#fff;">تأكيد الشراء</h3>
            <p id="modal-text" style="color:#aaa; font-size:14px;"></p>
            <div style="display:flex; gap:10px;">
                <button onclick="document.getElementById('confirm-modal').style.display='none'" style="flex:1; padding:10px; background:#444; border:none; color:white; border-radius:8px;">إلغاء</button>
                <button id="modal-confirm-btn" style="flex:1; padding:10px; background:#00cc66; border:none; color:white; border-radius:8px;">تأكيد</button>
            </div>
        </div>
    </div>
</div>

<script src="shop.js"></script>
<script>
    // ده الحل الجذري: بيستنى 200 ملي ثانية ويشغل الدالة
    setTimeout(() => {
        renderShopTab('mining');
    }, 200);
</script>
