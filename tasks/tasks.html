<div style="padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 80px; position: relative;">
    
    <div style="text-align: center; margin-bottom: 25px;">
        <div style="background: #111; border: 1px solid #333; border-radius: 20px; padding: 5px 20px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
            <span id="top-balance-tasks" class="sync-balance" style="color: #ffcc00; font-weight: bold; font-size: 18px;">ZN 0</span>
            <span>🪙</span>
        </div>
    </div>

    <div style="display: flex; background: #1a1a2e; border-radius: 12px; overflow: hidden; margin-bottom: 25px; border: 1px solid #2a2a4a;">
        <button id="btn-tab-promote" onclick="switchTasksTab('promote')" style="flex: 1; padding: 15px; background: transparent; color: #888; border: none; font-weight: bold; font-family: inherit; cursor: pointer; transition: 0.3s;">📢 روّج لقناتك</button>
        <button id="btn-tab-earn" onclick="switchTasksTab('earn')" style="flex: 1; padding: 15px; background: #0088cc; color: #fff; border: none; font-weight: bold; font-family: inherit; cursor: pointer; transition: 0.3s;">💰 اكسب ZN</button>
    </div>

    <div id="section-earn">
        <h4 style="color: #ffcc00; margin-bottom: 15px; text-align: right; border-bottom: 1px solid #333; padding-bottom: 10px;">المهمات والإعلانات المتاحة</h4>
        <div id="tasks-list-container">
            <div style="text-align: center; color: #888; font-size: 13px; padding: 20px;">جاري تحميل المهام... ⏳</div>
        </div>
    </div>

    <div id="section-promote" style="display: none;">
        
        <div style="background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid #334155; border-radius: 15px; padding: 25px; margin-bottom: 25px; text-align: center;">
            <div style="color: #94a3b8; font-size: 13px; margin-bottom: 10px;">رصيد الإعلانات الخاص بك</div>
            <div id="ad-balance-display" style="color: #38bdf8; font-size: 32px; font-weight: bold; margin-bottom: 20px;">AdZN 0</div>
            <button onclick="convertZnToAdZn()" style="background: rgba(56,189,248,0.1); border: 1px solid #38bdf8; color: #38bdf8; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;">🔄 شحن رصيد الإعلانات (من ZN)</button>
            <div style="color: #ef4444; font-size: 11px; margin-top: 10px;">* لا يمكن تحويل رصيد الإعلانات إلى ZN مرة أخرى</div>
        </div>

        <h4 style="color: #fff; margin-bottom: 15px; text-align: right;">إنشاء حملة جديدة</h4>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px;">
            <div onclick="openAdModal('يوتيوب')" style="background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer;">
                <i class="fab fa-youtube" style="color: #ef4444; font-size: 28px; margin-bottom: 12px;"></i>
                <div style="color: #fff; font-size: 13px; font-weight: bold;">فيديو / قناة</div>
            </div>
            <div onclick="openAdModal('تيليجرام')" style="background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer;">
                <i class="fab fa-telegram" style="color: #38bdf8; font-size: 28px; margin-bottom: 12px;"></i>
                <div style="color: #fff; font-size: 13px; font-weight: bold;">قناة / جروب</div>
            </div>
            <div onclick="openAdModal('موقع')" style="background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer;">
                <i class="fas fa-globe" style="color: #28a745; font-size: 28px; margin-bottom: 12px;"></i>
                <div style="color: #fff; font-size: 13px; font-weight: bold;">زيارة موقع</div>
            </div>
            <div onclick="openAdModal('انستغرام')" style="background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer;">
                <i class="fab fa-instagram" style="color: #e1306c; font-size: 28px; margin-bottom: 12px;"></i>
                <div style="color: #fff; font-size: 13px; font-weight: bold;">متابعة / لايك</div>
            </div>
            <div onclick="openAdModal('X')" style="background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer;">
                <i class="fab fa-twitter" style="color: #1da1f2; font-size: 28px; margin-bottom: 12px;"></i>
                <div style="color: #fff; font-size: 13px; font-weight: bold;">متابعة / ريتويت (X)</div>
            </div>
        </div>

        <h4 style="color: #fff; margin-bottom: 15px; text-align: right; border-bottom: 1px solid #333; padding-bottom: 10px;">حملاتي الإعلانية النشطة</h4>
        <div id="active-ads-container">
            </div>
    </div>

    <div id="ad-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: #1e1e2f; border: 1px solid #333; border-radius: 15px; padding: 25px; width: 90%; max-width: 400px; text-align: right;">
            <h3 id="ad-modal-title" style="color: #38bdf8; margin-top: 0;">إنشاء حملة</h3>
            
            <label style="color: #aaa; font-size: 12px;">رابط الحملة:</label>
            <input type="text" id="ad-link" placeholder="https://..." style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 10px; background: #111; border: 1px solid #444; color: #fff; border-radius: 8px;" dir="ltr">
            
            <label style="color: #aaa; font-size: 12px;">مكافأة الفرد (AdZN):</label>
            <input type="number" id="ad-reward" placeholder="مثال: 1000" style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 10px; background: #111; border: 1px solid #444; color: #fff; border-radius: 8px;">

            <label style="color: #aaa; font-size: 12px;">عدد الأشخاص المطلوب:</label>
            <input type="number" id="ad-users" placeholder="مثال: 50" style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 20px; background: #111; border: 1px solid #444; color: #fff; border-radius: 8px;">
            
            <div style="display: flex; gap: 10px;">
                <button onclick="submitAdCampaign()" style="flex: 1; padding: 10px; background: #38bdf8; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">نشر الإعلان</button>
                <button onclick="closeAdModal()" style="flex: 1; padding: 10px; background: #333; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">إلغاء</button>
            </div>
        </div>
    </div>
</div>
