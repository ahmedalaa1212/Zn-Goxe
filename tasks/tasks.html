<div style="padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 80px;">
    
    <!-- الرصيد الموحد أعلى الشاشة -->
    <div style="text-align: center; margin-bottom: 25px;">
        <div style="background: #111; border: 1px solid #333; border-radius: 20px; padding: 5px 20px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
            <span id="top-balance-tasks" class="sync-balance" style="color: #ffcc00; font-weight: bold; font-size: 18px;">ZN 0</span>
            <span>🪙</span>
        </div>
    </div>

    <!-- أزرار التبديل (اكسب / روّج) -->
    <div style="display: flex; background: #1a1a2e; border-radius: 12px; overflow: hidden; margin-bottom: 25px; border: 1px solid #2a2a4a;">
        <button id="btn-tab-promote" onclick="switchTasksTab('promote')" style="flex: 1; padding: 15px; background: transparent; color: #888; border: none; font-weight: bold; font-family: inherit; cursor: pointer; transition: 0.3s;">📢 روّج لقناتك</button>
        <button id="btn-tab-earn" onclick="switchTasksTab('earn')" style="flex: 1; padding: 15px; background: #0088cc; color: #fff; border: none; font-weight: bold; font-family: inherit; cursor: pointer; transition: 0.3s;">💰 اكسب ZN</button>
    </div>

    <!-- ========================================== -->
    <!-- 🟢 قسم: اكسب ZN (المهام) 🟢 -->
    <!-- ========================================== -->
    <div id="section-earn">
        <h4 style="color: #ffcc00; margin-bottom: 15px; text-align: right; border-bottom: 1px solid #333; padding-bottom: 10px;">المهمات المتاحة</h4>
        <!-- حاوية المهام اللي هتتحمل من الجافاسكريبت -->
        <div id="tasks-list-container">
            <div style="text-align: center; color: #888; margin-top: 50px;">جاري تحميل المهام... ⏳</div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- 🔵 قسم: روّج لقناتك (الإعلانات) 🔵 -->
    <!-- ========================================== -->
    <div id="section-promote" style="display: none;">
        
        <!-- كارت رصيد الإعلانات -->
        <div style="background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid #334155; border-radius: 15px; padding: 25px; margin-bottom: 25px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
            <div style="color: #94a3b8; font-size: 13px; margin-bottom: 10px;">رصيد الإعلانات الخاص بك</div>
            <div id="ad-balance-display" style="color: #38bdf8; font-size: 32px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px rgba(56,189,248,0.3);">AdZN 0</div>
            <button onclick="convertZnToAdZn()" style="background: rgba(56,189,248,0.1); border: 1px solid #38bdf8; color: #38bdf8; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.2s;">🔄 شحن رصيد الإعلانات</button>
        </div>

        <h4 style="color: #fff; margin-bottom: 15px; text-align: center;">اختر نوع الحملة الإعلانية</h4>
        
        <!-- أزرار الحملات الأربعة -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div onclick="alert('قريباً: إضافة حملة تيليجرام')" style="background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer;">
                <i class="fab fa-telegram" style="color: #38bdf8; font-size: 28px; margin-bottom: 12px;"></i>
                <div style="color: #fff; font-size: 13px; font-weight: bold;">قناة / جروب</div>
            </div>
            <div onclick="alert('قريباً: إضافة حملة يوتيوب')" style="background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer;">
                <i class="fab fa-youtube" style="color: #ef4444; font-size: 28px; margin-bottom: 12px;"></i>
                <div style="color: #fff; font-size: 13px; font-weight: bold;">فيديو / قناة</div>
            </div>
            <div onclick="alert('قريباً: إضافة حملة انستجرام')" style="background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer;">
                <i class="fab fa-instagram" style="color: #ec4899; font-size: 28px; margin-bottom: 12px;"></i>
                <div style="color: #fff; font-size: 13px; font-weight: bold;">متابعة / لايك</div>
            </div>
            <div onclick="alert('قريباً: إضافة حملة مواقع')" style="background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer;">
                <i class="fas fa-globe" style="color: #22c55e; font-size: 28px; margin-bottom: 12px;"></i>
                <div style="color: #fff; font-size: 13px; font-weight: bold;">زيارة موقع</div>
            </div>
        </div>
    </div>

</div>
