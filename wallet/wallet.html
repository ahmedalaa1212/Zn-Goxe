<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#0f0f0f; margin:0; font-family: sans-serif;">

<!-- تعديل احترافي: أضفنا معرف للقسم الرئيسي للمحفظة لمراقبته بشكل فوري -->
<div id="main-wallet-section" class="wallet-container" style="padding:20px; color:#fff; max-width:400px; margin:0 auto; background:#0f0f0f; min-height:100vh; box-sizing: border-box;">
    
    <!-- كارت الرصيد والمكافئ بالدولار -->
    <div style="background:#1c1c1c; padding:20px; border-radius:15px; border:1px solid #222; text-align:center; margin-bottom:20px;">
        <div style="color:#aaa; font-size:14px; margin-bottom:5px;">رصيد ZN: <b id="wallet-zn-balance" style="color:#fff;">15400</b></div>
        <div id="wallet-usd-balance" style="color:#00cc66; font-size:32px; font-weight:bold; font-family:monospace;">0.03080 $</div>
    </div>

    <!-- أزرار التحكم في التبويبات -->
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button id="btn-deposit" onclick="renderWalletTab('deposit')" style="flex:1; padding:12px; border:none; color:white; border-radius:8px; background:#222; font-weight:bold; font-size:14px; transition: background 0.1s ease;">إيداع</button>
        <button id="btn-history" onclick="renderWalletTab('history')" style="flex:1; padding:12px; border:none; color:white; border-radius:8px; background:#222; font-weight:bold; font-size:14px; transition: background 0.1s ease;">سجلات</button>
        <button id="btn-withdraw" onclick="renderWalletTab('withdraw')" style="flex:1; padding:12px; border:none; color:white; border-radius:8px; background:#222; font-weight:bold; font-size:14px; transition: background 0.1s ease;">سحب</button>
    </div>

    <!-- وعاء عرض محتوى القسم النشط -->
    <div id="wallet-content"></div>

</div>

<script src="wallet.js"></script>
</body>
</html>
