<div class="wallet-container" style="padding: 20px; color: #fff; max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 20px;">المحفظة</h2>

    <!-- شريط التبويبات -->
    <div style="display: flex; gap: 5px; margin-bottom: 20px;">
        <button id="tab-deposit" onclick="openWalletTab('deposit')" style="flex:1; padding:10px; background:#0088cc; border:none; color:#fff; border-radius:5px; cursor:pointer;">إيداع</button>
        <button id="tab-history" onclick="openWalletTab('history')" style="flex:1; padding:10px; background:#222; border:1px solid #444; color:#fff; border-radius:5px; cursor:pointer;">سجلات</button>
        <button id="tab-withdraw" onclick="openWalletTab('withdraw')" style="flex:1; padding:10px; background:#222; border:1px solid #444; color:#fff; border-radius:5px; cursor:pointer;">سحب</button>
    </div>

    <!-- مكان عرض المحتوى -->
    <div id="wallet-content"></div>
</div>
