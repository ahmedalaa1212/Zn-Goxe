<div class="wallet-container" style="padding: 20px; color: #fff; max-width: 400px; margin: 0 auto; font-family: sans-serif;">
    <!-- عرض الأرصدة -->
    <div style="background: #1c1c1c; padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; margin-bottom: 20px;">
        <div style="color: #aaa; font-size: 14px;">رصيد ZN: <span id="zn-balance">15,400</span></div>
        <div style="color: #00cc66; font-size: 28px; font-weight: bold; margin-top: 5px;">$ <span id="usd-balance">0.00000</span></div>
    </div>

    <!-- التبويبات -->
    <div style="display: flex; gap: 5px; margin-bottom: 20px;">
        <button id="btn-deposit" onclick="render('deposit')" style="flex:1; padding:10px; background:#0088cc; border:none; color:white; border-radius:8px;">إيداع</button>
        <button id="btn-history" onclick="render('history')" style="flex:1; padding:10px; background:#222; border:1px solid #444; color:white; border-radius:8px;">سجلات</button>
        <button id="btn-withdraw" onclick="render('withdraw')" style="flex:1; padding:10px; background:#222; border:1px solid #444; color:white; border-radius:8px;">سحب</button>
    </div>

    <div id="wallet-content"></div>
</div>
