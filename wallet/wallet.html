<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحفظة - Zn Goxe</title>
</head>
<body style="background:#0f0f0f; margin:0; font-family: sans-serif; -webkit-user-select: none; user-select: none;">

<!-- القسم الرئيسي للمحفظة مع المعرّف الفوري للمراقبة السريعة -->
<div id="main-wallet-section" class="wallet-container" style="padding:20px; color:#fff; max-width:400px; margin:0 auto; background:#0f0f0f; min-height:100vh; box-sizing: border-box;">
    
    <!-- كارت الرصيد والمكافئ بالدولار الاحترافي -->
    <div style="background:#1c1c1c; padding:20px; border-radius:15px; border:1px solid #222; text-align:center; margin-bottom:20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        <div style="color:#aaa; font-size:14px; margin-bottom:5px; font-weight: 500;">
            رصيد: <span id="wallet-zn-balance" style="color:#fff; font-weight: bold;">15,400</span> ZN
        </div>
        <div id="wallet-usd-balance" style="color:#00cc66; font-size:32px; font-weight:bold; font-family:monospace; letter-spacing: 0.5px;">0.03080 $</div>
    </div>

    <!-- أزرار التحكم والتبويبات السريعة بالتأثير البصري المريح -->
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button id="btn-deposit" onclick="renderWalletTab('deposit')" style="flex:1; padding:12px; border:none; color:white; border-radius:10px; background:#222; font-weight:bold; font-size:14px; cursor:pointer; transition: all 0.15s ease;">إيداع</button>
        <button id="btn-history" onclick="renderWalletTab('history')" style="flex:1; padding:12px; border:none; color:white; border-radius:10px; background:#222; font-weight:bold; font-size:14px; cursor:pointer; transition: all 0.15s ease;">سجلات</button>
        <button id="btn-withdraw" onclick="renderWalletTab('withdraw')" style="flex:1; padding:12px; border:none; color:white; border-radius:10px; background:#222; font-weight:bold; font-size:14px; cursor:pointer; transition: all 0.15s ease;">سحب</button>
    </div>

    <!-- الوعاء الديناميكي الذي تظهر فيه البيانات فوراً وبدون تأخير -->
    <div id="wallet-content"></div>

</div>

<!-- رسالة توست منبثقة سريعة تظهر عند النسخ وتختفي تلقائياً -->
<div id="wallet-toast" style="display:none; position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#00cc66; color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:bold; z-index:10000; box-shadow:0 4px 10px rgba(0,0,0,0.5); font-family: sans-serif;">
    تم نسخ العنوان بنجاح! 📋
</div>

<script src="wallet.js"></script>
</body>
</html>
