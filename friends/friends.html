<div class="friends-page">
    <!-- الرصيد الحالي للمستخدم (يتم تحديثه بالـ JS) -->
    <div class="header-balance">
        <img src="assets/zn-coin.png" alt="ZN" class="coin-icon" onerror="this.style.display='none'"> 
        <span id="friends-current-balance">0</span>
    </div>

    <h2 class="page-title">دعوة الأصدقاء</h2>

    <!-- قسم رابط الإحالة -->
    <div class="referral-card">
        <p class="card-label">رابط الدعوة الخاص بك:</p>
        <div class="invite-link-container">
            <input type="text" id="invite-link-input" readonly value="جاري إنشاء الرابط...">
            <button id="copy-link-btn" onclick="copyInviteLink()">نسخ الرابط</button>
        </div>
    </div>

    <!-- قسم تجميع أرباح الأصدقاء -->
    <div class="earnings-card">
        <p class="card-label">الأرباح المجمعة من الأصدقاء (10%):</p>
        <div class="earnings-amount">
            <span class="currency">ZN</span> <span id="pending-referral-earnings">0</span>
        </div>
        <p class="fee-note">سيتم خصم 3% رسوم تحويل عند التجميع</p>
        <button id="claim-earnings-btn" onclick="claimReferralEarnings()">تجميع أرباح الأصدقاء</button>
    </div>

    <!-- قسم إحصائيات الأصدقاء -->
    <div class="stats-card">
        <p>إجمالي الأصدقاء المدعوين: <span id="total-invited-friends" style="color: #ffcc00; font-weight: bold;">0</span></p>
    </div>

    <!-- قائمة المهام -->
    <div id="friends-tasks-list" class="tasks-container">
        <!-- سيتم توليد المهام هنا عبر الجافاسكربت -->
    </div>
</div>
