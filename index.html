<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zn Goxe - Crypto Mining</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="farm/farm.css">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #121212; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-bottom: 70px;
        }

        /* التحكم في إخفاء وإظهار القوائم */
        .game-view { display: none !important; }
        .game-view.active { display: block !important; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* شريط التنقل السفلي */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #1a1a1a; display: flex; justify-content: space-around;
            padding: 10px 0; border-top: 1px solid #333; z-index: 1000;
        }
        .nav-item {
            background: none; border: none; color: #777;
            display: flex; flex-direction: column; align-items: center;
            font-size: 12px; cursor: pointer; transition: 0.2s;
        }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: #0088cc; }
    </style>
</head>
<body>

    <div id="app">
        <div id="view-farm" class="game-view active"></div>
        <div id="view-shop" class="game-view"></div>
        <div id="view-friends" class="game-view"></div>
        <div id="view-wallet" class="game-view"></div>
        <div id="view-settings" class="game-view"></div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="switchView('friends')" id="nav-friends">
            <i class="fas fa-users"></i><span>الأصدقاء</span>
        </button>
        <button class="nav-item" onclick="switchView('wallet')" id="nav-wallet">
            <i class="fas fa-wallet"></i><span>المحفظة</span>
        </button>
        <button class="nav-item active" onclick="switchView('farm')" id="nav-farm">
            <i class="fas fa-screwdriver-wrench"></i><span>المزرعة</span>
        </button>
        <button class="nav-item" onclick="switchView('shop')" id="nav-shop">
            <i class="fas fa-store"></i><span>المتجر</span>
        </button>
        <button class="nav-item" onclick="switchView('settings')" id="nav-settings">
            <i class="fas fa-cog"></i><span>الإعدادات</span>
        </button>
    </nav>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    
    <script>
        // هذه الدالة ستقوم بسحب تصميمات الـ HTML من مجلداتك وعرضها
        async function loadAllViews() {
            const views = [
                { id: 'view-farm', path: 'farm/farm.html' },
                { id: 'view-shop', path: 'shop/shop.html' },
                { id: 'view-friends', path: 'friends/friends.html' },
                { id: 'view-wallet', path: 'wallet/wallet.html' },
                { id: 'view-settings', path: 'settings/settings.html' }
            ];

            // 1. جلب محتوى التصميمات (HTML) أولاً
            for (let view of views) {
                try {
                    let response = await fetch(view.path);
                    if (response.ok) {
                        let html = await response.text();
                        document.getElementById(view.id).innerHTML = html;
                    } else {
                        console.error("لم يتم العثور على مسار: " + view.path);
                    }
                } catch (error) {
                    console.error("خطأ في جلب التصميم: ", error);
                }
            }

            // 2. بعد ظهور التصميمات بالكامل، نقوم بتحميل ملفات الـ JS لتعمل الأزرار والبيانات
            const scripts = [
                'game.js',
                'farm/farm.js',
                'shop/shop.js',
                'friends/friends.js',
                'settings/settings.js',
                'wallet/wallet.js'
            ];

            for (let jsPath of scripts) {
                let script = document.createElement('script');
                script.src = jsPath;
                document.body.appendChild(script);
            }
        }

        // تشغيل كل شيء بمجرد فتح التطبيق
        document.addEventListener('DOMContentLoaded', loadAllViews);

        // دالة التنقل (مدمجة هنا لضمان عمل الأزرار السفلية فوراً)
        function switchView(viewName) {
            document.querySelectorAll('.game-view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-${viewName}`).classList.add('active');
        }
    </script>
</body>
</html>
