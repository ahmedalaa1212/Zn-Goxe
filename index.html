<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zn Goxe - Crypto Mining</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة تليجرام يجب أن تكون في الأعلى لضمان تحميلها مبكراً -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='11322720' data-sdk='show_11322720'></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <link rel="stylesheet" href="farm/farm.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- بوابة الحماية -->
    <div id="security-gate" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; z-index:9999999; display:flex; justify-content:center; align-items:center; flex-direction:column; color:white;">
        <div style="font-size: 50px; margin-bottom: 20px; animation: pulse 1.5s infinite;">🛡️</div>
        <h2 style="color:#f59e0b; margin:0; font-family: Tahoma, sans-serif; font-size: 18px;">جاري مصادقة الحساب مع الخادم...</h2>
    </div>

    <!-- التطبيق -->
    <div id="app" style="display: none;">
        <div id="view-friends" class="game-view"></div>
        <div id="view-wallet" class="game-view"></div>
        <div id="view-tasks" class="game-view"></div>
        <div id="view-farm" class="game-view active"></div>
        <div id="view-games" class="game-view"></div>
        <div id="view-shop" class="game-view"></div>
        <div id="view-settings" class="game-view"></div>
    </div>

    <!-- شريط التنقل -->
    <nav class="bottom-nav" id="main-nav" style="display: none;">
        <button class="nav-item" onclick="switchView('friends')" id="nav-friends">
            <i class="fas fa-users"></i><span>الأصدقاء</span>
        </button>
        <button class="nav-item" onclick="switchView('wallet')" id="nav-wallet">
            <i class="fas fa-wallet"></i><span>المحفظة</span>
        </button>
        <button class="nav-item" onclick="switchView('tasks')" id="nav-tasks">
            <i class="fas fa-list-check"></i><span>المهام</span>
        </button>
        <button class="nav-item nav-center-btn active" onclick="switchView('farm')" id="nav-farm">
            <i class="fas fa-screwdriver-wrench"></i>
            <span class="nav-center-text">المزرعة</span>
        </button>
        <button class="nav-item" onclick="switchView('games')" id="nav-games">
            <i class="fas fa-gamepad"></i><span>الألعاب</span>
        </button>
        <button class="nav-item" onclick="switchView('shop')" id="nav-shop">
            <i class="fas fa-store"></i><span>المتجر</span>
        </button>
        <button class="nav-item" onclick="switchView('settings')" id="nav-settings">
            <i class="fas fa-cog"></i><span>الإعدادات</span>
        </button>
    </nav>

    <script>
        // ==========================================
        // 🔴 نظام التحقق الجذري الجديد (متصل بـ security.py) 🔴
        // ==========================================
        
        // رابط السيرفر الجديد بتاعك على Railway (هنغيره لما ترفع السيرفر)
        const SERVER_URL = "https://YOUR_NEW_RAILWAY_URL.up.railway.app"; 

        async function verifyAndStartGame() {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready(); 
                window.Telegram.WebApp.expand(); 
            }

            const initData = window.Telegram?.WebApp?.initData;
            let isBanned = false;
            let isAuthorized = false;

            if (initData) {
                try {
                    // إرسال البصمة للسيرفر الجديد للتحقق
                    const response = await fetch(`${SERVER_URL}/api/auth`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ initData: initData })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        isAuthorized = true;
                        // حفظ بيانات المستخدم في الذاكرة عشان باقي القوائم تستخدمها
                        window.userData = data.user; 
                    } else if (data.banned) {
                        isBanned = true;
                    }
                } catch (err) {
                    console.error("خطأ في الاتصال بالسيرفر:", err);
                    // لو السيرفر واقع، ممكن نمنع الدخول أو نسمح بدخول مؤقت حسب رغبتك
                    // حالياً هنسيبه يكمل عشان تقدر تجرب الواجهة
                    isAuthorized = true; 
                }
            } else {
                console.log("لم يتم العثور على بيانات تليجرام، ربما تفتح من المتصفح مباشرة.");
                // للتجربة من المتصفح العادي أثناء البرمجة (يفضل إيقافها عند النشر)
                isAuthorized = true;
            }

            if (isBanned) {
                document.getElementById('security-gate').innerHTML = `
                    <div style="font-size: 80px; margin-bottom: 20px;">🚫</div>
                    <h1 style="color: #ef4444; margin-bottom: 15px; font-size: 24px;">تم حظر حسابك نهائياً!</h1>
                    <p style="color: #cbd5e1; line-height: 1.6; font-size: 15px; max-width: 400px; text-align: center;">عذراً، لا يمكنك استخدام التطبيق.</p>
                `;
            } else if (isAuthorized) {
                document.getElementById('security-gate').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('main-nav').style.display = 'flex';
                loadAllViews();
            }
        }

        async function loadAllViews() {
            const cacheVersion = new Date().getTime(); 
            
            const views = [
                { id: 'view-friends', path: 'friends/friends.html' },
                { id: 'view-wallet', path: 'wallet/wallet.html' },
                { id: 'view-tasks', path: 'tasks/tasks.html' },
                { id: 'view-farm', path: 'farm/farm.html' },
                { id: 'view-games', path: 'games/games.html' },
                { id: 'view-shop', path: 'shop/shop.html' },
                { id: 'view-settings', path: 'settings/settings.html' }
            ];

            for (let view of views) {
                try {
                    let response = await fetch(`${view.path}?v=${cacheVersion}`);
                    if (response.ok) {
                        let html = await response.text();
                        document.getElementById(view.id).innerHTML = html;
                    }
                } catch (error) {}
            }

            // تحميل ملف الذاكرة المؤقتة الأساسي
            let mainScript = document.createElement('script');
            mainScript.src = `game.js?v=${cacheVersion}`;
            
            mainScript.onload = () => {
                const scripts = [
                    'friends/friends.js', 'wallet/wallet.js', 'tasks/tasks.js',
                    'farm/farm.js', 'games/games.js', 'shop/shop.js', 'settings/settings.js'
                ];
                scripts.forEach(jsPath => {
                    let script = document.createElement('script');
                    script.src = `${jsPath}?v=${cacheVersion}`;
                    document.body.appendChild(script);
                });
            };
            document.body.appendChild(mainScript);
        }

        function switchView(viewName) {
            document.querySelectorAll('.game-view').forEach(v => v.classList.remove('active'));
            let targetView = document.getElementById(`view-${viewName}`);
            if (targetView) targetView.classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            let targetNav = document.getElementById(`nav-${viewName}`);
            if (targetNav) targetNav.classList.add('active');

            if (typeof window.triggerAllUIUpdates === 'function') {
                window.triggerAllUIUpdates();
            }
        }

        document.addEventListener('DOMContentLoaded', verifyAndStartGame);
    </script>

    <style>
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</body>
</html>
