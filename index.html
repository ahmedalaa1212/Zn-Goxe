<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zn Goxe - Crypto Mining</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- مكتبة تليجرام -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- 📢 كود إعلانات Monetag الرسمي -->
    <script src="https://libtl.com/sdk.js" data-zone="11322720" data-sdk="show_11322720"></script>
    
    <!-- 📢 كود إعلانات OnClickA (تم نقله هنا ليعمل على مستوى التطبيق بالكامل) -->
    <script async src="https://js.onclckmn.com/static/onclicka.js" data-admpid="449087"></script>
    
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <link rel="stylesheet" href="farm/farm.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- شاشة التحميل -->
    <div id="loading-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; z-index:9999999; display:flex; justify-content:center; align-items:center; flex-direction:column; color:white;">
        <div style="font-size: 50px; margin-bottom: 20px; animation: pulse 1.5s infinite;">🚀</div>
        <h2 style="color:#f59e0b; margin:0; font-family: Tahoma, sans-serif; font-size: 18px;">جاري تحميل اللعبة...</h2>
    </div>

    <!-- التطبيق -->
    <div id="app" style="display: none;">
        <div id="view-friends" class="game-view"></div>
        <div id="view-wallet" class="game-view"></div>
        <div id="view-tasks" class="game-view"></div>
        <div id="view-farm" class="game-view active"></div>
        <div id="view-games" class="game-view"></div>
        <div id="view-shop" class="game-view"></div>
        <div id="view-settings" class="game-view"></div>
    </div>

    <!-- شريط التنقل -->
    <nav class="bottom-nav" id="main-nav" style="display: none;">
        <button class="nav-item" onclick="switchView('friends')" id="nav-friends">
            <i class="fas fa-users"></i><span>الأصدقاء</span>
        </button>
        <button class="nav-item" onclick="switchView('wallet')" id="nav-wallet">
            <i class="fas fa-wallet"></i><span>المحفظة</span>
        </button>
        <button class="nav-item" onclick="switchView('tasks')" id="nav-tasks">
            <i class="fas fa-list-check"></i><span>المهام</span>
        </button>
        <button class="nav-item nav-center-btn active" onclick="switchView('farm')" id="nav-farm">
            <i class="fas fa-screwdriver-wrench"></i>
            <span class="nav-center-text">المزرعة</span>
        </button>
        <button class="nav-item" onclick="switchView('games')" id="nav-games">
            <i class="fas fa-gamepad"></i><span>الألعاب</span>
        </button>
        <button class="nav-item" onclick="switchView('shop')" id="nav-shop">
            <i class="fas fa-store"></i><span>المتجر</span>
        </button>
        <button class="nav-item" onclick="switchView('settings')" id="nav-settings">
            <i class="fas fa-cog"></i><span>الإعدادات</span>
        </button>
    </nav>

    <script>
        async function verifyAndStartGame() {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready(); 
                window.Telegram.WebApp.expand(); 
            }

            const initData = window.Telegram?.WebApp?.initData;
            if (!initData) {
                console.log("⚠️ وضع المتصفح: تم فتح اللعبة للمراجعة. لن يتم حفظ أي بيانات حقيقية.");
            }

            // تحميل الصفحات ثم إخفاء شاشة التحميل
            await loadAllViews();

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('main-nav').style.display = 'flex';
        }

        async function loadAllViews() {
            const cacheVersion = new Date().getTime(); 
            
            const views = [
                { id: 'view-friends', path: 'friends/friends.html' },
                { id: 'view-wallet', path: 'wallet/wallet.html' },
                { id: 'view-tasks', path: 'tasks/tasks.html' },
                { id: 'view-farm', path: 'farm/farm.html' },
                { id: 'view-games', path: 'games/games.html' },
                { id: 'view-shop', path: 'shop/shop.html' },
                { id: 'view-settings', path: 'settings/settings.html' }
            ];

            // جلب ملفات الـ HTML وتحميلها
            for (let view of views) {
                try {
                    let response = await fetch(`${view.path}?v=${cacheVersion}`);
                    if (response.ok) {
                        let html = await response.text();
                        document.getElementById(view.id).innerHTML = html;
                    } else {
                        console.error(`❌ خطأ في تحميل ${view.path}: كود ${response.status}`);
                    }
                } catch (error) {
                    console.error("❌ فشل الاتصال لتحميل العرض:", view.path, error);
                }
            }

            // تحميل game.js أولاً ثم باقي السكريبتات الفرعية
            loadScript(`game.js?v=${cacheVersion}`, () => {
                const scripts = [
                    'friends/friends.js', 'wallet/wallet.js', 'tasks/tasks.js',
                    'farm/farm.js', 'games/games.js', 'shop/shop.js', 'settings/settings.js'
                ];
                scripts.forEach(jsPath => {
                    loadScript(`${jsPath}?v=${cacheVersion}`);
                });
            });
        }

        function loadScript(src, callback) {
            let script = document.createElement('script');
            script.src = src;
            script.async = false; 
            if (callback) script.onload = callback;
            document.body.appendChild(script);
        }

        function switchView(viewName) {
            document.querySelectorAll('.game-view').forEach(v => v.classList.remove('active'));
            let targetView = document.getElementById(`view-${viewName}`);
            if (targetView) targetView.classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            let targetNav = document.getElementById(`nav-${viewName}`);
            if (targetNav) targetNav.classList.add('active');

            if (typeof window.triggerAllUIUpdates === 'function') {
                window.triggerAllUIUpdates();
            }
        }

        document.addEventListener('DOMContentLoaded', verifyAndStartGame);
    </script>

    <style>
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</body>
</html>
