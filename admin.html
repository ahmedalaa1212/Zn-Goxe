<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن - Space Miners</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #0f172a; color: #fff; padding: 20px; text-align: center; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; max-width: 400px; margin: 50px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        input { background: #334155; color: #fff; }
        button { background: #10b981; color: #fff; font-weight: bold; cursor: pointer; }
        button:hover { background: #059669; }
        .error { color: #ef4444; }
        .success { color: #10b981; }
        #userInfo { text-align: right; margin-top: 15px; background: #334155; padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>👑 لوحة تحكم الأدمن</h2>
        
        <input type="password" id="secret" placeholder="أدخل كلمة سر الأدمن (Secret)">
        <input type="text" id="userId" placeholder="أدخل Telegram ID للاعب">
        <button onclick="getUserData()">بحث عن اللاعب</button>

        <div id="userInfo">
            <p><strong>اسم اللاعب:</strong> <span id="pName"></span></p>
            <p><strong>رصيد ZN الحالي:</strong> <span id="pBalance"></span></p>
            <p><strong>رصيد الدولار الحالي:</strong> <span id="pUsd"></span></p>
            
            <hr style="border-color: #475569;">
            
            <label>إضافة/خصم ZN (اكتب القيمة بالسالب للخصم):</label>
            <input type="number" id="addBalance" placeholder="مثال: 1000 أو -500">
            <button onclick="updateBalance()" style="background: #3b82f6;">تحديث الرصيد</button>
        </div>

        <p id="msg" class="error"></p>
    </div>

    <script>
        const ADMIN_SECRET_DEFAULT = "ZnGoxeAdmin2026!";
        document.getElementById('secret').value = ADMIN_SECRET_DEFAULT; // لتسهيل التجربة

        async function getUserData() {
            const secret = document.getElementById('secret').value;
            const userId = document.getElementById('userId').value.trim();
            const msg = document.getElementById('msg');
            const userInfo = document.getElementById('userInfo');
            
            msg.innerText = "";
            userInfo.style.display = "none";

            if (!userId) {
                msg.innerText = "الرجاء إدخال ID المستخدم!";
                return;
            }

            try {
                const res = await fetch('/api/admin/get_user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret, user_id: userId })
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('pName').innerText = data.data.user_name || 'غير معروف';
                    document.getElementById('pBalance').innerText = data.data.balance || 0;
                    document.getElementById('pUsd').innerText = data.data.usd_balance || 0;
                    userInfo.style.display = "block";
                } else {
                    msg.innerText = data.error || "حدث خطأ ما";
                }
            } catch (err) {
                msg.innerText = "فشل الاتصال بالسيرفر";
            }
        }

        async function updateBalance() {
            const secret = document.getElementById('secret').value;
            const userId = document.getElementById('userId').value.trim();
            const addVal = parseFloat(document.getElementById('addBalance').value) || 0;
            const msg = document.getElementById('msg');

            if (addVal === 0) {
                msg.innerText = "الرجاء إدخال قيمة صحيحة للتحديث!";
                return;
            }

            // حساب الرصيد الجديد بناءً على الموجود
            const currentBal = parseFloat(document.getElementById('pBalance').innerText) || 0;
            const newBalance = currentBal + addVal;

            try {
                const res = await fetch('/api/admin/update_user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        secret, 
                        user_id: userId,
                        updates: { balance: newBalance }
                    })
                });
                const data = await res.json();

                if (data.success) {
                    msg.className = "success";
                    msg.innerText = "تم تحديث الرصيد بنجاح! 🚀";
                    getUserData(); // تحديث البيانات المعروضة
                } else {
                    msg.className = "error";
                    msg.innerText = data.error || "فشل التحديث";
                }
            } catch (err) {
                msg.className = "error";
                msg.innerText = "فشل الاتصال بالسيرفر";
            }
        }
    </script>
</body>
</html>
