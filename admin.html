<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة تحكم ZN</title>
    <link rel="stylesheet" href="admin_style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <!-- شاشة الحماية -->
    <div id="accessDenied" class="security-screen">
        <h2>⛔ جاري التحقق من الهوية...</h2>
    </div>

    <!-- لوحة التحكم -->
    <div id="adminPanel" class="dashboard-container" style="display: none;">
        
        <!-- القائمة الجانبية -->
        <div class="sidebar">
            <div class="logo">إدارة ZN 👑</div>
            
            <button onclick="loadSection('super_admin', this)">
                <span class="icon">👨‍💻</span>
                <span>الإدارة العليا</span>
            </button>
            
            <button onclick="loadSection('users', this)">
                <span class="icon">👥</span>
                <span>بيانات المستخدم</span>
            </button>
            
            <button onclick="loadSection('support', this)">
                <span class="icon">💬</span>
                <span>الدردشة والدعم</span>
            </button>
            
            <button onclick="loadSection('settings', this)">
                <span class="icon">⚙️</span>
                <span>الإعدادات</span>
            </button>
            
            <button onclick="loadSection('transactions', this)">
                <span class="icon">💰</span>
                <span>سجل التحويلات</span>
            </button>
            
            <button onclick="loadSection('security', this)">
                <span class="icon">🛡️</span>
                <span>التحكم والأمان</span>
            </button>
            
            <button onclick="loadSection('ads', this)">
                <span class="icon">📢</span>
                <span>الإعلانات</span>
            </button>
        </div>

        <!-- مساحة العرض الرئيسية -->
        <div class="main-content" id="contentArea">
            <div class="content-card animate-fade-in">
                <h2 style="color: #f59e0b; margin-bottom: 8px;">مرحباً بك يا مدير 👋</h2>
                <p style="color: #94a3b8; font-size: 13px;">اختر قسماً من القائمة الجانبية لبدء التحكم في اللعبة.</p>
            </div>
        </div>

    </div>

    <script src="main.js"></script>
    
    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        
        const tg = window.Telegram.WebApp;
        const MY_ADMIN_ID = 5102387551; // ⚠️ ضع الـ ID الخاص بك هنا

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            if (tg.initDataUnsafe.user.id === MY_ADMIN_ID) {
                document.getElementById('accessDenied').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'flex';
            } else {
                document.getElementById('accessDenied').innerHTML = "<h2>⛔ دخول غير مصرح به! أنت لست الأدمن.</h2>";
                setTimeout(() => { tg.close(); }, 3000);
            }
        } else {
            document.getElementById('accessDenied').innerHTML = "<h2>⛔ يجب فتح اللوحة من داخل بوت تليجرام فقط.</h2>";
        }
    </script>
</body>
</html>
